name: RalliPadel
options:
  bundleIdPrefix: com.rallipadel
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  RalliPadel:
    type: application
    platform: iOS
    sources:
      - path: Shared
      - path: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rallipadel.ios
        PRODUCT_NAME: Ralli Padel
        INFOPLIST_KEY_CFBundleDisplayName: Ralli Padel
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: RalliWatchApp
        embed: true
  RalliWatchApp:
    type: application
    platform: watchOS
    sources:
      - path: Shared
      - path: Watch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rallipadel.ios.watchkitapp
        PRODUCT_NAME: Ralli
        INFOPLIST_KEY_CFBundleDisplayName: Ralli
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.rallipadel.ios
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_STYLE: Automatic
  RalliPadelTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: RalliPadel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rallipadel.tests
        GENERATE_INFOPLIST_FILE: true
schemes:
  RalliPadel:
    build:
      targets:
        RalliPadel: all
        RalliWatchApp: all
        RalliPadelTests: [test]
    test:
      targets:
        - RalliPadelTests

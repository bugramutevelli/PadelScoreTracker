name: PadelScoreTracker
options:
  bundleIdPrefix: com.rallipadel
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  PadelScoreTracker:
    type: application
    platform: iOS
    sources:
      - path: Shared
      - path: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rallipadel.ios
        PRODUCT_NAME: PadelScoreTracker
        PRODUCT_MODULE_NAME: PadelScoreTracker
        INFOPLIST_KEY_CFBundleDisplayName: Padel Score Tracker
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: PadelScoreTrackerWatch
        embed: true
  PadelScoreTrackerWatch:
    type: application
    platform: watchOS
    sources:
      - path: Shared
      - path: Watch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rallipadel.ios.watchkitapp
        PRODUCT_NAME: Padel Score
        INFOPLIST_KEY_CFBundleDisplayName: Padel Score
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.rallipadel.ios
        INFOPLIST_KEY_NSHealthShareUsageDescription: Padel antrenmanında kalori, nabız, adım ve mesafe bilgilerini göstermek için Sağlık verilerine erişilir.
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: Padel antrenmanını Apple Sağlık ve Fitness'a kaydetmek için izin gerekir.
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: Watch/PadelScoreTrackerWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
  PadelScoreTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: PadelScoreTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rallipadel.tests
        GENERATE_INFOPLIST_FILE: true
schemes:
  PadelScoreTracker:
    build:
      targets:
        PadelScoreTracker: all
        PadelScoreTrackerWatch: all
        PadelScoreTrackerTests: [test]
    test:
      targets:
        - PadelScoreTrackerTests

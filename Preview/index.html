<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Padel Score Tracker — Windows Önizleme</title>
  <style>
    :root{--bg:#080d18;--panel:#111a2a;--muted:#8290a8;--cyan:#22d3ee;--orange:#fb923c;--lime:#c8f43d;--line:#26324a}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 18% 15%,#172854 0,transparent 34%),radial-gradient(circle at 85% 80%,#143d45 0,transparent 30%),#060912;color:#f6f8fb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:grid;place-items:center;padding:36px}
    .stage{display:flex;align-items:center;gap:64px}.phone{width:390px;height:844px;border:10px solid #252b35;border-radius:52px;background:var(--bg);box-shadow:0 36px 90px #000b;overflow:hidden;position:relative}.island{position:absolute;z-index:5;top:10px;left:50%;translate:-50%;width:120px;height:32px;border-radius:20px;background:#020305}.screen{height:100%;padding:54px 18px 26px;overflow:auto}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}.brand{font-size:25px;font-weight:850;letter-spacing:-1px;color:var(--lime);white-space:nowrap}.tag{width:45px;height:45px;display:grid;place-items:center}.brand-mark{width:45px;height:45px;filter:drop-shadow(0 7px 14px #0008)}.hero{height:190px;border-radius:27px;padding:0;background:linear-gradient(120deg,rgba(3,7,18,.64) 0%,rgba(8,18,33,.25) 43%,rgba(8,18,33,0) 100%),linear-gradient(90deg,rgba(34,211,238,.06),transparent 35%),url("padel-hero.png") center/cover;position:relative;overflow:hidden;box-shadow:inset 0 0 0 1px #ffffff1c}.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.16),transparent 54%);pointer-events:none}.hero b,.hero small{position:absolute;left:23px;z-index:1}.hero b{top:30px;font-size:31px;line-height:1.02;letter-spacing:-1.3px;text-shadow:0 2px 18px #000,0 0 3px #000}.hero small{bottom:20px;display:block;width:212px;color:#dcecff;font-size:10px;line-height:1.2;text-shadow:0 1px 12px #000,0 0 2px #000}.section-title{margin:23px 3px 9px;color:var(--muted);font-size:11px;font-weight:800;letter-spacing:1.4px}.section-title.a{color:var(--cyan)}.section-title.b{color:var(--orange)}.team{background:#111827;border:1px solid #202c42;border-radius:18px;padding:13px 16px;margin-bottom:10px}.team label{font-size:10px;font-weight:900}.team.a label{color:var(--cyan)}.team.b label{color:var(--orange)}.player{display:block;width:100%;padding:9px 0;font-size:14px;color:white;background:none;border:0;outline:0}.player+.player{border-top:1px solid #263147}.setting-select{width:100%;margin-bottom:8px;padding:11px 12px;border:1px solid #263147;border-radius:12px;background:#111827;color:white}.start{width:100%;margin-top:17px;border:0;border-radius:17px;background:var(--lime);color:#132000;font-size:16px;font-weight:900;padding:16px;cursor:pointer}.hidden{display:none!important}
    .live-head{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted)}.live-label{font-weight:900;color:white;letter-spacing:1px}.scoreboard{margin-top:34px;border-block:1px solid var(--line);padding:16px 0;display:grid;grid-template-columns:1fr 35px}.row{display:contents}.team-name{padding:8px 0;font-weight:700;font-size:14px}.games{text-align:center;padding:8px 0;font-size:20px;font-weight:850;color:var(--cyan)}.tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}.tile{height:220px;border-radius:24px;border:1px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;user-select:none}.tile.a{color:var(--cyan);background:#22d3ee18}.tile.b{color:var(--orange);background:#fb923c18}.tile small{font-weight:900}.tile strong{font-size:76px;line-height:1.1}.tile em{font-size:11px;font-style:normal;font-weight:800}.info{display:flex;justify-content:space-between;margin-top:13px;background:#ffffff0e;padding:15px;border-radius:15px;font-size:12px;font-weight:700}.actions{display:flex;gap:8px;margin-top:14px}.actions button{flex:1;padding:12px;border-radius:12px;border:1px solid var(--line);background:#111827;color:white;cursor:pointer}.actions .danger{color:#ff7070}.live-sync{display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:12px;font-weight:800}.live-sync .green{color:#56e676}.live-score-header{text-align:center;margin-top:12px}.live-score-header>small{display:block;color:var(--lime);font-size:16px;font-weight:950;letter-spacing:1.3px}.live-score-header>span{display:block;color:var(--muted);font-size:14px;font-weight:850;margin-top:7px}.live-set-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px}.live-set-box{min-height:58px;display:flex;align-items:center;justify-content:center;gap:10px}.live-set-box.a{color:var(--cyan)}.live-set-box.b{color:var(--orange)}.live-set-box span{font-size:12px;font-weight:950;letter-spacing:.6px}.live-set-box b{font-size:40px;line-height:1;font-weight:950}.live-watch-score{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:22px}.live-card{height:352px;border-radius:24px;border:1px solid;display:flex;flex-direction:column;align-items:center;cursor:pointer;user-select:none;touch-action:manipulation;transition:transform .10s ease-out,background-color .10s ease-out,box-shadow .10s ease-out}.live-card:active{transform:scale(1.025)}.live-card.a{color:var(--cyan);background:#22d3ee18}.live-card.b{color:var(--orange);background:#fb923c18}.live-card.a:active{background:#22d3ee36;box-shadow:0 0 18px #22d3ee33}.live-card.b:active{background:#fb923c36;box-shadow:0 0 18px #fb923c33}.live-card small{font-size:13px;font-weight:950;letter-spacing:.3px;margin-top:16px}.live-card strong{font-size:88px;line-height:1;margin:28px 0 24px}.live-players{width:100%;display:grid;gap:7px}.live-player{min-height:27px;width:max-content;max-width:130px;justify-self:center;padding:4px 10px;display:flex;align-items:center;justify-content:center;gap:5px;color:#ffffffdc;font-family:ui-rounded,"SF Pro Rounded",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-align:center;border:1px solid transparent;border-radius:999px}.live-player.serving{color:#e3ff94;background:#baff3d24;border-color:#c2ff4c45}.live-ball{width:15px;height:15px;display:inline-block;flex:0 0 15px}.live-ball img{display:block;width:100%;height:100%;object-fit:contain}.live-ball.hidden{visibility:hidden}.live-actions{margin-top:24px;display:flex;flex-direction:column;gap:10px;align-items:stretch}.undo-pill{width:100%;height:52px;border:1px solid #ffffff28;border-radius:999px;color:white;background:linear-gradient(135deg,rgba(173,84,245,.64),rgba(109,52,223,.46));box-shadow:0 7px 18px #8b3ff030;cursor:pointer;font-size:16px;font-weight:850;display:flex;align-items:center;justify-content:center;gap:8px}.finish-pill{width:100%;height:38px;border:1px solid #ffffff29;border-radius:999px;background:#ef4444e0;color:white;font-size:13px;font-weight:850;cursor:pointer}.watch{width:230px;height:270px;background:#080a0f;border:10px solid #353a42;border-radius:62px;box-shadow:0 30px 70px #000a;padding:25px 16px;position:relative}.crown{position:absolute;right:-19px;top:64px;width:10px;height:45px;border-radius:5px;background:#444b56}.watch-top{display:flex;justify-content:space-between;font-size:10px;color:#a5afbf}.watch-score{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:17px}.wbtn{height:115px;border-radius:16px;border:1px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer}.wbtn.a{color:var(--cyan);background:#22d3ee18}.wbtn.b{color:var(--orange);background:#fb923c18}.wbtn b{font-size:44px}.watch-note{text-align:center;font-size:10px;color:var(--muted);margin-top:10px}.hint{position:fixed;bottom:16px;color:#718098;font-size:12px}
    .live-set-line{margin-top:10px;display:flex;align-items:baseline;justify-content:center;gap:14px;white-space:nowrap}.live-set-line b{font-size:44px;line-height:1;font-weight:950}.live-set-line b.a,.live-set-line .set-label.a{color:var(--cyan)}.live-set-line b.b,.live-set-line .set-label.b{color:var(--orange)}.set-label{font-size:13px;font-weight:950;letter-spacing:.6px}.set-sep{font-size:38px;line-height:1;font-weight:950;color:#ffffffd6}
    @media(max-width:800px){body{padding:16px}.stage{transform:scale(.8);gap:20px}.watch{display:none}.hint{display:none}}
  </style>
</head>
<body>
  <main class="stage">
    <section class="phone">
      <div class="island"></div>
      <div class="screen" id="setup">
        <div class="top"><div class="brand">Padel Score Tracker</div><div class="tag" aria-label="Padel Score Tracker ikonu"><svg class="brand-mark" viewBox="0 0 96 96" role="img"><defs><linearGradient id="homeRacketFill" x1="16" y1="8" x2="82" y2="82"><stop offset="0" stop-color="#ecf7ff"/><stop offset="0.52" stop-color="#738397"/><stop offset="1" stop-color="#1e2633"/></linearGradient><linearGradient id="homeRacketEdge" x1="24" y1="10" x2="76" y2="72"><stop offset="0" stop-color="#f8fbff"/><stop offset="1" stop-color="#8d9caf"/></linearGradient><radialGradient id="homeBallFill" cx="35%" cy="30%" r="72%"><stop offset="0" stop-color="#f3ff8a"/><stop offset="0.72" stop-color="#c8f43d"/><stop offset="1" stop-color="#8ec918"/></radialGradient></defs><g transform="rotate(-22 48 48)"><ellipse cx="43" cy="34" rx="22" ry="29" fill="url(#homeRacketFill)" stroke="url(#homeRacketEdge)" stroke-width="4"/><ellipse cx="43" cy="34" rx="15" ry="21" fill="#101723" opacity=".72"/><g fill="#8ea0b3"><circle cx="35" cy="22" r="2.2"/><circle cx="43" cy="20" r="2.2"/><circle cx="51" cy="22" r="2.2"/><circle cx="32" cy="31" r="2.2"/><circle cx="41" cy="31" r="2.2"/><circle cx="50" cy="31" r="2.2"/><circle cx="35" cy="41" r="2.2"/><circle cx="43" cy="43" r="2.2"/><circle cx="51" cy="41" r="2.2"/><circle cx="40" cy="52" r="2.2"/><circle cx="48" cy="51" r="2.2"/></g><rect x="38" y="58" width="12" height="29" rx="5" fill="#d9e4ee"/><rect x="40.5" y="62" width="7" height="25" rx="3.5" fill="#151b25"/></g><circle cx="68" cy="66" r="13" fill="url(#homeBallFill)" stroke="#eaff78" stroke-width="2.5"/><path d="M58 64c7 1 13-2 19-8M58 70c8-1 14 2 20 8" fill="none" stroke="#7daa14" stroke-width="2.4" stroke-linecap="round" opacity=".86"/></svg></div></div>
        <div class="hero"><b>Skor sende,<br>aklın oyunda.</b><small>iPhone ve Apple Watch birlikte çalışır.</small></div>
        <div class="section-title a">TAKIM A</div><div class="team a"><label>OYUNCULAR</label><input class="player" id="h1" value="Buğra" oninput="syncNames()"><input class="player" id="h2" value="Oyuncu 2" oninput="syncNames()"></div>
        <div class="section-title b">TAKIM B</div><div class="team b"><label>OYUNCULAR</label><input class="player" id="a1" value="Oyuncu 3" oninput="syncNames()"><input class="player" id="a2" value="Oyuncu 4" oninput="syncNames()"></div>
        <div class="section-title">MAÇ AYARLARI</div>
        <select class="setting-select" id="format"><option value="bestOfThree">3 set üzerinden</option><option value="singleSet">Tek set</option><option value="miniSets">Mini setler (4 oyun)</option><option value="advantageFinalSet">3. set: Avantaj seti</option><option value="matchTieBreak">3. set: Match tie-break (7)</option><option value="superTieBreak">3. set: Super tie-break (10)</option></select>
        <select class="setting-select" id="rule"><option value="advantage">Klasik avantaj</option><option value="starPoint">Star Point — 3. deuce karar puanı</option><option value="goldenPoint">Golden Point — ilk deuce karar puanı</option></select>
        <select class="setting-select" id="firstServer"></select>
        <button class="start" onclick="startMatch()">▶ &nbsp; Maçı Başlat</button>
      </div>
      <div class="screen hidden" id="live">
        <div class="live-sync"><span id="elapsed">0 dk</span><span class="green">Watch eşzamanlı</span></div>
        <header class="live-score-header"><small>SET SKORU</small><div class="live-set-line"><span class="set-label a">TAKIM A</span><b class="a" id="liveSa">0</b><span class="set-sep">:</span><b class="b" id="liveSb">0</b><span class="set-label b">TAKIM B</span></div><span id="liveMatchLine">1. SET · OYUN 0–0</span></header>
        <div class="live-watch-score"><div class="live-card a" onclick="point('a')"><small>TAKIM A</small><strong id="pa">0</strong><div class="live-players" id="livePlayersA"></div></div><div class="live-card b" onclick="point('b')"><small>TAKIM B</small><strong id="pb">0</strong><div class="live-players" id="livePlayersB"></div></div></div>
        <div class="live-actions"><button class="undo-pill" onclick="undo()"><span>↺</span><span>Undo</span></button><button class="finish-pill" onclick="resetMatch()">Maçı Bitir</button></div>
      </div>
    </section>
    <aside class="watch"><div class="crown"></div><div class="watch-top"><span id="wserver">Buğra</span><b>Set <span id="wsa">0</span>–<span id="wsb">0</span></b></div><div class="watch-score"><div class="wbtn a" onclick="point('a')"><small>A</small><b id="wpa">0</b></div><div class="wbtn b" onclick="point('b')"><small>B</small><b id="wpb">0</b></div></div><div class="watch-note" id="watchPhase">Oyun 0–0</div></aside>
  </main>
  <div class="hint">Takım kartlarına tıkla — skor iPhone ve Watch’ta birlikte ilerler.</div>
  <script>
    const labels=['0','15','30','40'];let s={a:0,b:0,ga:0,gb:0,sa:0,sb:0,server:0,rule:'advantage',format:'bestOfThree',tieBreak:false,tbPlayed:0,matchTB:false,winner:null},history=[],servers=[];
    function syncNames(){servers=[h1.value||'Oyuncu 1',a1.value||'Oyuncu 3',h2.value||'Oyuncu 2',a2.value||'Oyuncu 4'];let selected=firstServer.value;firstServer.innerHTML=servers.map((n,i)=>`<option value="${i}">${n} · Takım ${i%2?'B':'A'}</option>`).join('');firstServer.value=selected||'0'}
    function startMatch(){syncNames();s={a:0,b:0,ga:0,gb:0,sa:0,sb:0,server:Number(firstServer.value),rule:rule.value,format:format.value,tieBreak:false,tbPlayed:0,matchTB:false,winner:null};history=[];document.querySelector('#setup').classList.add('hidden');document.querySelector('#live').classList.remove('hidden');render()}
    function deciding(){return s.a===s.b&&((s.rule==='goldenPoint'&&s.a===3)||(s.rule==='starPoint'&&s.a>=5))}
    function gamesTarget(){return s.format==='miniSets'?4:6}function setsTarget(){return s.format==='singleSet'?1:2}function decidingTBTarget(){return s.format==='matchTieBreak'?7:s.format==='superTieBreak'?10:null}
    function winSet(t){s['s'+t]++;s.a=s.b=s.ga=s.gb=s.tbPlayed=0;s.tieBreak=s.matchTB=false;if(s['s'+t]>=setsTarget())s.winner=t;else if(s.sa===1&&s.sb===1&&decidingTBTarget()){s.tieBreak=s.matchTB=true}}
    function winGame(t){s['g'+t]++;s.a=s.b=0;s.server=(s.server+1)%4;let target=gamesTarget(),o=t==='a'?'b':'a';if(s['g'+t]>=target&&s['g'+t]-s['g'+o]>=2)winSet(t);else if(s.ga===target&&s.gb===target&&!(s.format==='advantageFinalSet'&&s.sa+s.sb===2)){s.tieBreak=true;s.tbPlayed=0}}
    function point(t){if(s.winner)return;history.push({...s});let o=t==='a'?'b':'a';if(!s.tieBreak&&deciding()){winGame(t);render();return}s[t]++;if(s.tieBreak){s.tbPlayed++;if(s.tbPlayed===1||s.tbPlayed%2===1)s.server=(s.server+1)%4;let target=s.matchTB?decidingTBTarget():7;if(s[t]>=target&&s[t]-s[o]>=2)winSet(t)}else{let won=s.rule==='goldenPoint'?s[t]>=4:(s[t]>=4&&s[t]-s[o]>=2);if(won)winGame(t)}render()}
    function undo(){if(history.length)s=history.pop();render()}
    function resetMatch(){history=[];document.querySelector('#live').classList.add('hidden');document.querySelector('#setup').classList.remove('hidden')}
    function label(t){if(s.tieBreak)return String(s[t]);let o=t==='a'?'b':'a';if(s.rule==='starPoint'&&deciding())return'★';if(s.rule!=='goldenPoint'&&s[t]>=3&&s[o]>=3){if(s[t]===s[o])return'40';return s[t]>s[o]?'AV':'40'}return labels[Math.min(s[t],3)]}
    function playerLine(name,index){let serving=s.server===index;return `<div class="live-player ${serving?'serving':''}"><span class="live-ball ${serving?'':'hidden'}"><img src="tennis-ball.png" alt=""></span><span>${name}</span></div>`}
    function render(){let a=label('a'),b=label('b');['pa','wpa'].forEach(id=>document.querySelector('#'+id).textContent=a);['pb','wpb'].forEach(id=>document.querySelector('#'+id).textContent=b);liveSa.textContent=s.sa;liveSb.textContent=s.sb;liveMatchLine.textContent=s.tieBreak?'TIE-BREAK':`${s.sa+s.sb+1}. SET · OYUN ${s.ga}–${s.gb}`;livePlayersA.innerHTML=playerLine(servers[0],0)+playerLine(servers[2],2);livePlayersB.innerHTML=playerLine(servers[1],1)+playerLine(servers[3],3);wsa.textContent=s.sa;wsb.textContent=s.sb;document.querySelector('#wserver').textContent=servers[s.server];let phase=s.winner?`TAKIM ${s.winner==='a'?'A':'B'} KAZANDI`:s.tieBreak?`TIE-BREAK ${s.a}–${s.b}`:`Oyun ${s.ga}–${s.gb}`;watchPhase.textContent=phase}
    syncNames();
  </script>
</body>
</html>

<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Padel Score Tracker — Apple Watch Önizleme</title>
  <style>
    :root{--cyan:#22d3ee;--orange:#fb923c;--muted:#8d98aa}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 28% 20%,#153066,transparent 35%),radial-gradient(circle at 75% 76%,#16434a,transparent 30%),#050812;color:white;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}
    .layout{display:flex;align-items:center;gap:72px}.copy{width:300px}.eyebrow{color:#c8f43d;font-size:12px;font-weight:900;letter-spacing:1.8px}.copy h1{font-size:42px;line-height:1.03;margin:13px 0}.copy p{color:#9da9ba;line-height:1.55}.hint{font-size:12px;color:#6f7b8d;margin-top:24px}
    .watch-wrap{position:relative;padding:74px 0}.strap{position:absolute;left:50%;translate:-50%;top:-115px;width:175px;height:650px;border-radius:60px;background:linear-gradient(90deg,#242933,#4b515d 48%,#272d37);box-shadow:inset 0 0 0 3px #666b73}
    .watch{position:relative;width:332px;height:402px;border-radius:88px;background:linear-gradient(145deg,#656b74,#171b21 22%,#101217 77%,#505760);padding:14px;box-shadow:0 40px 90px #000c, inset 0 0 0 2px #777b82}
    .crown{position:absolute;right:-29px;top:92px;width:23px;height:65px;border-radius:10px;background:repeating-linear-gradient(0deg,#363c46 0 3px,#5e6570 3px 5px);box-shadow:4px 0 8px #000}.side{position:absolute;right:-19px;top:177px;width:11px;height:54px;border-radius:5px;background:#3f4650}
    .screen{height:100%;border-radius:75px;background:#050609;padding:22px 18px 16px;overflow:hidden;display:flex;flex-direction:column}.top{display:flex;justify-content:center;align-items:center;font-size:13px}.sets{font-size:17px;font-weight:900}.mode{text-align:center;margin:7px 0 9px;color:#8c98a9;font-size:10px;font-weight:850;letter-spacing:1.1px}
    .score{display:grid;grid-template-columns:1fr 1fr;gap:8px}.team{height:174px;border:1px solid;border-radius:25px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;user-select:none;transition:transform .08s}.team:active{transform:scale(.96)}.a{color:var(--cyan);background:#22d3ee17}.b{color:var(--orange);background:#fb923c17}.team small{font-weight:900}.team b{font-size:55px;line-height:1}.players{width:100%;margin-top:7px;display:grid;gap:2px}.player{height:16px;display:flex;justify-content:center;align-items:center;gap:4px;color:white;font-size:10px;font-weight:650;white-space:nowrap;overflow:hidden}.ball{font-size:10px}.ball.hidden{visibility:hidden}.bottom{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:6px}.undo{border:1px solid #444b58;border-radius:50%;width:44px;height:44px;color:white;background:#20242b;cursor:pointer;font-size:21px;font-weight:900}.side-label{font-size:11px;color:var(--muted)}.health{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px}.metric{font-size:9px;font-weight:750;text-align:center;padding:5px 2px;border-radius:7px;background:#ffffff0b}.cal{color:#fb923c}.time{color:#22d3ee}.steps{color:#4ade80}.distance{color:#60a5fa}
    @media(max-width:780px){.copy{display:none}.layout{transform:scale(.82)}.watch-wrap{padding:0}.strap{top:-155px}}
  </style>
</head>
<body>
  <main class="layout">
    <section class="copy"><div class="eyebrow">APPLE WATCH</div><h1>Bilekten tek dokunuşla skor.</h1><p>Telefon çantada kalır. Puan, servis sırası ve oyun skoru saat üzerinde net biçimde görünür.</p><div class="hint">Turkuaz veya turuncu skor alanına tıklayarak dene.</div></section>
    <div class="watch-wrap"><div class="strap"></div><div class="watch"><div class="crown"></div><div class="side"></div><section class="screen"><header class="top"><span class="sets">Set <span id="sa">0</span>–<span id="sb">0</span></span></header><div class="mode" id="phase">OYUN 0–0 · SET 1</div><div class="score"><div class="team a" onclick="point('a')"><small>TAKIM A</small><b id="pa">0</b><div class="players" id="playersA"></div></div><div class="team b" onclick="point('b')"><small>TAKIM B</small><b id="pb">0</b><div class="players" id="playersB"></div></div></div><footer class="bottom"><button class="undo" onclick="undo()">↶</button><span class="side-label" id="side">Sağ taraf</span></footer></section></div></div>
  </main>
  <script>
    document.querySelector('.bottom').insertAdjacentHTML('afterend','<div class="health"><div class="metric cal">🔥 286 kcal</div><div class="metric time">◷ 54 dk</div><div class="metric steps">🚶 4.218 adım</div><div class="metric distance">◆ 3,14 km</div></div>');
    const labels=['0','15','30','40'],servers=['Buğra','Oyuncu 3','Oyuncu 2','Oyuncu 4'];let s={a:0,b:0,ga:0,gb:0,sa:0,sb:0,server:0,tieBreak:false,tbPlayed:0,winner:null},history=[];
    function label(t){if(s.tieBreak)return String(s[t]);const o=t==='a'?'b':'a';if(s[t]>=3&&s[o]>=3){if(s[t]===s[o])return'40';return s[t]>s[o]?'AV':'40'}return labels[Math.min(s[t],3)]}
    function completeSet(t){s['s'+t]++;s.a=s.b=s.ga=s.gb=s.tbPlayed=0;s.tieBreak=false;if(s['s'+t]>=2)s.winner=t}
    function completeGame(t){s['g'+t]++;s.a=s.b=0;s.server=(s.server+1)%4;const o=t==='a'?'b':'a';if(s['g'+t]>=6&&s['g'+t]-s['g'+o]>=2)completeSet(t);else if(s.ga===6&&s.gb===6){s.tieBreak=true;s.tbPlayed=0}}
    function point(t){if(s.winner)return;history.push({...s});const o=t==='a'?'b':'a';s[t]++;if(s.tieBreak){s.tbPlayed++;if(s.tbPlayed===1||s.tbPlayed%2===1)s.server=(s.server+1)%4;if(s[t]>=7&&s[t]-s[o]>=2)completeSet(t)}else if(s[t]>=4&&s[t]-s[o]>=2)completeGame(t);render()}
    function undo(){if(history.length){s=history.pop();render()}}
    function playerLine(name,index){return `<div class="player"><span class="ball ${s.server===index?'':'hidden'}">🎾</span><span>${name}</span></div>`}
    function render(){pa.textContent=label('a');pb.textContent=label('b');sa.textContent=s.sa;sb.textContent=s.sb;playersA.innerHTML=playerLine(servers[0],0)+playerLine(servers[2],2);playersB.innerHTML=playerLine(servers[1],1)+playerLine(servers[3],3);phase.textContent=s.winner?`TAKIM ${s.winner==='a'?'A':'B'} MAÇI KAZANDI`:s.tieBreak?`TIE-BREAK ${s.a}–${s.b}`:`OYUN ${s.ga}–${s.gb} · SET ${s.sa+s.sb+1}`;side.textContent=s.tieBreak?'TIE-BREAK':((s.a+s.b)%2?'Sol taraf':'Sağ taraf')}
    render();
  </script>
</body></html>

<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ralli — Apple Watch Önizleme</title>
  <style>
    :root{--cyan:#22d3ee;--orange:#fb923c;--muted:#8d98aa}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 28% 20%,#153066,transparent 35%),radial-gradient(circle at 75% 76%,#16434a,transparent 30%),#050812;color:white;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}
    .layout{display:flex;align-items:center;gap:72px}.copy{width:300px}.eyebrow{color:#c8f43d;font-size:12px;font-weight:900;letter-spacing:1.8px}.copy h1{font-size:42px;line-height:1.03;margin:13px 0}.copy p{color:#9da9ba;line-height:1.55}.hint{font-size:12px;color:#6f7b8d;margin-top:24px}
    .watch-wrap{position:relative;padding:74px 0}.strap{position:absolute;left:50%;translate:-50%;top:-115px;width:175px;height:650px;border-radius:60px;background:linear-gradient(90deg,#242933,#4b515d 48%,#272d37);box-shadow:inset 0 0 0 3px #666b73}
    .watch{position:relative;width:332px;height:402px;border-radius:88px;background:linear-gradient(145deg,#656b74,#171b21 22%,#101217 77%,#505760);padding:14px;box-shadow:0 40px 90px #000c, inset 0 0 0 2px #777b82}
    .crown{position:absolute;right:-29px;top:92px;width:23px;height:65px;border-radius:10px;background:repeating-linear-gradient(0deg,#363c46 0 3px,#5e6570 3px 5px);box-shadow:4px 0 8px #000}.side{position:absolute;right:-19px;top:177px;width:11px;height:54px;border-radius:5px;background:#3f4650}
    .screen{height:100%;border-radius:75px;background:#050609;padding:31px 25px 22px;overflow:hidden;display:flex;flex-direction:column}.top{display:flex;justify-content:space-between;align-items:center;font-size:13px}.server{max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#dfe5ee}.sets{font-size:18px;font-weight:900}.mode{text-align:center;margin:17px 0 11px;color:#8c98a9;font-size:11px;font-weight:850;letter-spacing:1.2px}
    .score{display:grid;grid-template-columns:1fr 1fr;gap:9px}.team{height:176px;border:1px solid;border-radius:25px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;user-select:none;transition:transform .08s}.team:active{transform:scale(.96)}.a{color:var(--cyan);background:#22d3ee17}.b{color:var(--orange);background:#fb923c17}.team small{font-weight:900}.team b{font-size:67px;line-height:1.1}.team span{font-size:10px;font-weight:800}.bottom{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:13px}.undo{border:0;border-radius:50%;width:34px;height:34px;color:white;background:#20242b;cursor:pointer}.side-label{font-size:11px;color:var(--muted)}
    @media(max-width:780px){.copy{display:none}.layout{transform:scale(.82)}.watch-wrap{padding:0}.strap{top:-155px}}
  </style>
</head>
<body>
  <main class="layout">
    <section class="copy"><div class="eyebrow">APPLE WATCH</div><h1>Bilekten tek dokunuşla skor.</h1><p>Telefon çantada kalır. Puan, servis sırası ve oyun skoru saat üzerinde net biçimde görünür.</p><div class="hint">Turkuaz veya turuncu skor alanına tıklayarak dene.</div></section>
    <div class="watch-wrap"><div class="strap"></div><div class="watch"><div class="crown"></div><div class="side"></div><section class="screen"><header class="top"><span class="server">🏓 <span id="server">Buğra</span></span><span class="sets"><span id="ga">0</span>–<span id="gb">0</span></span></header><div class="mode">CANLI MAÇ · SET 1</div><div class="score"><div class="team a" onclick="point('a')"><small>TAKIM A</small><b id="pa">0</b><span>PUAN EKLE</span></div><div class="team b" onclick="point('b')"><small>TAKIM B</small><b id="pb">0</b><span>PUAN EKLE</span></div></div><footer class="bottom"><button class="undo" onclick="undo()">↶</button><span class="side-label" id="side">Sağ taraf</span></footer></section></div></div>
  </main>
  <script>
    const labels=['0','15','30','40'],servers=['Buğra','Oyuncu 3','Oyuncu 2','Oyuncu 4'];let s={a:0,b:0,ga:0,gb:0,server:0},history=[];
    function label(t){const o=t==='a'?'b':'a';if(s[t]>=3&&s[o]>=3){if(s[t]===s[o])return'40';return s[t]>s[o]?'AV':'40'}return labels[Math.min(s[t],3)]}
    function point(t){history.push({...s});s[t]++;const o=t==='a'?'b':'a';if(s[t]>=4&&s[t]-s[o]>=2){s['g'+t]++;s.a=s.b=0;s.server=(s.server+1)%4}render()}
    function undo(){if(history.length){s=history.pop();render()}}
    function render(){pa.textContent=label('a');pb.textContent=label('b');ga.textContent=s.ga;gb.textContent=s.gb;server.textContent=servers[s.server];side.textContent=(s.a+s.b)%2?'Sol taraf':'Sağ taraf'}
  </script>
</body></html>
